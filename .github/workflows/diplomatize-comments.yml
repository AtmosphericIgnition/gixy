name: Diplomatize Comments

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  diplomatize:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      models: read

    steps:
      - name: Diplomatize and hide hostile comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const originalComment = context.payload.comment.body;
            const commentAuthor = context.payload.comment.user.login;
            const commentNodeId = context.payload.comment.node_id;

            // Don't process bot comments
            if (context.payload.comment.user.type === 'Bot') {
              console.log('Skipping bot comment');
              return;
            }

            // Don't process maintainer comments (add your username here)
            const maintainers = ['dvershinin'];
            if (maintainers.includes(commentAuthor)) {
              console.log(`Skipping maintainer comment from ${commentAuthor}`);
              return;
            }

            console.log(`Processing comment from ${commentAuthor}`);

            // Call GitHub Models API to analyze and diplomatize
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${{ secrets.GITHUB_TOKEN }}`,
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [
                  {
                    role: 'system',
                    content: `You are a content moderator for an open source project.

            TASK: Analyze the comment and determine if it needs moderation. Then provide a professional rewrite.

            RESPOND IN THIS EXACT JSON FORMAT:
            {
              "needs_moderation": true/false,
              "reason": "brief reason if moderation needed",
              "rewritten": "the professional version of the comment"
            }

            MODERATION CRITERIA - set needs_moderation to TRUE if ANY of these apply:
            - Profanity or vulgar language
            - Personal attacks or insults (toward anyone, including AI/bots)
            - Condescending or dismissive tone
            - Aggressive or hostile language
            - Sarcasm intended to belittle
            - "AI slop", "garbage", "trash", "stupid", "idiot", "retarded", "brain-dead", etc.

            REWRITING RULES:
            - PRESERVE all technical content, bug reports, criticisms, and valid points
            - REMOVE hostility, insults, and unprofessional language
            - Keep the same meaning and structure
            - Do NOT add emojis or excessive pleasantries
            - If comment is already professional, return it unchanged in "rewritten"

            IMPORTANT: Output ONLY valid JSON, nothing else.`
                  },
                  {
                    role: 'user',
                    content: originalComment
                  }
                ],
                temperature: 0.1,
                max_tokens: 2000
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              console.log(`GitHub Models API error: ${response.status} - ${errorText}`);
              return;
            }

            const data = await response.json();
            let result;
            try {
              result = JSON.parse(data.choices[0].message.content.trim());
            } catch (e) {
              console.log('Failed to parse AI response:', data.choices[0].message.content);
              return;
            }

            console.log('Moderation result:', result);

            if (!result.needs_moderation) {
              console.log('Comment is professional - no action needed');
              return;
            }

            console.log(`Hiding comment: ${result.reason}`);

            // Hide the original comment using GraphQL
            await github.graphql(`
              mutation($id: ID!, $classifier: ReportedContentClassifiers!) {
                minimizeComment(input: {subjectId: $id, classifier: $classifier}) {
                  minimizedComment {
                    isMinimized
                  }
                }
              }
            `, {
              id: commentNodeId,
              classifier: 'ABUSE'
            });

            console.log('Original comment hidden');

            // Post the diplomatic version
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `**Comment from @${commentAuthor}** *(reformatted for constructive discussion)*:

            ---

            ${result.rewritten}

            ---

            <sub>🤖 The original comment was hidden due to: ${result.reason}. Technical content preserved above.
            [Community guidelines](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/master/CODE_OF_CONDUCT.md)</sub>`
            });

            console.log('Diplomatic version posted successfully');
