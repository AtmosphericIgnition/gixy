name: Diplomatize Comments

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  diplomatize:
    runs-on: ubuntu-latest
    # Only run if comment contains potential hostility indicators
    if: |
      contains(github.event.comment.body, 'garbage') ||
      contains(github.event.comment.body, 'trash') ||
      contains(github.event.comment.body, 'stupid') ||
      contains(github.event.comment.body, 'retarded') ||
      contains(github.event.comment.body, 'idiot') ||
      contains(github.event.comment.body, 'wtf') ||
      contains(github.event.comment.body, 'GFY') ||
      contains(github.event.comment.body, 'crap') ||
      contains(github.event.comment.body, 'sucks') ||
      contains(github.event.comment.body, 'terrible') ||
      contains(github.event.comment.body, 'awful') ||
      contains(github.event.comment.body, 'horrible')

    permissions:
      issues: write
      pull-requests: write
      models: read

    steps:
      - name: Diplomatize hostile comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const originalComment = context.payload.comment.body;
            const commentAuthor = context.payload.comment.user.login;
            const commentId = context.payload.comment.id;

            // Don't process bot comments
            if (context.payload.comment.user.type === 'Bot') {
              console.log('Skipping bot comment');
              return;
            }

            console.log(`Processing comment from ${commentAuthor}`);

            // Call GitHub Models API to diplomatize
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${{ secrets.GITHUB_TOKEN }}`,
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              },
              body: JSON.stringify({
                model: 'openai/gpt-4o-mini',
                messages: [
                  {
                    role: 'system',
                    content: `You are a diplomatic translator for open source project discussions.

            Your task: Rewrite the following comment to be professional and constructive while preserving ALL technical points, criticisms, and feedback.

            Rules:
            1. PRESERVE all technical content, bug reports, feature requests, and valid criticisms
            2. REMOVE profanity, insults, personal attacks, and hostile tone
            3. Keep the same structure and meaning
            4. Do NOT add emojis
            5. Do NOT be sycophantic or add unnecessary pleasantries
            6. If the comment is already professional, return it unchanged
            7. Return ONLY the rewritten comment, no explanations

            Example:
            Input: "This code is garbage. The function doesn't handle null values and crashes."
            Output: "There appears to be an issue with this code. The function doesn't handle null values and crashes."`
                  },
                  {
                    role: 'user',
                    content: originalComment
                  }
                ],
                temperature: 0.3,
                max_tokens: 2000
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              console.log(`GitHub Models API error: ${response.status} - ${errorText}`);
              return;
            }

            const data = await response.json();
            const diplomaticVersion = data.choices[0].message.content.trim();

            // Check if the comment was actually changed
            if (diplomaticVersion === originalComment) {
              console.log('Comment unchanged - no hostility detected by AI');
              return;
            }

            // Check if changes are significant (more than just whitespace)
            const normalize = (s) => s.toLowerCase().replace(/\s+/g, ' ').trim();
            if (normalize(diplomaticVersion) === normalize(originalComment)) {
              console.log('Only whitespace changes - skipping');
              return;
            }

            console.log('Posting diplomatic version');

            // Determine if this is an issue comment or PR review comment
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;

            // Post the diplomatic version as a reply
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `<details>
            <summary>🤖 <strong>Constructive Feedback Translation</strong></summary>

            *The comment above contained language that may be difficult to engage with constructively. Here's the same feedback in a more professional tone:*

            ---

            ${diplomaticVersion}

            ---

            <sub>This translation preserves the technical content while removing hostile language.
            [Why this bot exists](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/master/CODE_OF_CONDUCT.md)</sub>

            </details>`
            });

            console.log('Diplomatic version posted successfully');
