name: Release to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  # Run all tests first - release only if they pass
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ['3.6', '3.7', '3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        include:
          - python-version: '3.6'
            container: python:3.6-slim
          - python-version: '3.7'
            container: python:3.7-slim
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ !matrix.container }}
      - uses: actions/checkout@v3
        if: ${{ matrix.container }}

      - name: Set up Python ${{ matrix.python-version }}
        if: ${{ !matrix.container }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements.dev.txt

      - name: Run tests
        run: pytest -v -n auto

  # Verify Python 3.6 compatibility for scripts
  py36-compat:
    name: Python 3.6 compatibility
    runs-on: ubuntu-22.04
    container:
      image: python:3.6-slim
    steps:
      - uses: actions/checkout@v3
      - name: Verify scripts
        run: |
          python scripts/check_plugin_help_urls.py
          python scripts/check_plugin_docs.py

  # Build and publish only after all tests pass
  release:
    name: Build and publish to PyPI
    needs: [test, py36-compat]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gixy-ng
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import gixy; print(gixy.version)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) doesn't match package version ($PKG_VERSION)"
            exit 1
          fi
          echo "✅ Version $PKG_VERSION matches tag"

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing - no API token needed!
        # Configure at: https://pypi.org/manage/project/gixy-ng/settings/publishing/
